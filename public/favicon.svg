<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Toolkify">
  <title>Toolkify</title>
  <!-- Fanned tool icon centered in a 128x128 square -->
  <g transform="translate(64,64) rotate(-30)">
    <rect x="0" y="-6" width="44" height="12" rx="6" fill="#F5A9C0"/>
    <circle cx="44" cy="0" r="8" fill="none" stroke="#F5A9C0" stroke-width="4"/>
  </g>
  <g transform="translate(64,64) rotate(0)">
    <rect x="0" y="-6" width="56" height="12" rx="2" fill="#2DD4BF"/>
    <rect x="16" y="-6" width="2" height="12" fill="#0B0F14"/>
    <rect x="30" y="-6" width="2" height="12" fill="#0B0F14"/>
    <rect x="44" y="-6" width="2" height="12" fill="#0B0F14"/>
  </g>
  <g transform="translate(64,64) rotate(30)">
    <rect x="0" y="-6" width="44" height="12" rx="2" fill="#F2C230"/>
    <path d="M44 -6 l8 6 l-8 6 z" fill="#F2C230"/>
  </g>
  <circle cx="64" cy="64" r="7" fill="#FFFFFF"/>
  <style>
    /* Dark mode: white center dot (default above) */
    @media (prefers-color-scheme: light) {
      circle:last-of-type { fill: #0B0F14; }
      g:nth-of-type(2) rect:nth-child(n+2) { fill: #FFFFFF; }
    }
  </style>
</svg>
