<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toolkify — Animated Logo</title>

<!-- GSAP core (reliable cdnjs mirror). Only used for precise stagger/spring sequencing;
     all visual motion is transform / opacity / clip / filter based for GPU smoothness. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
  /* ============================================================
     THEME TOKENS  — the only things that change between modes.
     Brand hues (pink/teal) stay constant; yellow + text + pivot +
     tick "cutouts" + flash color adapt so the mark reads correctly
     on either surface.
     ============================================================ */
  body.dark  {
    --bg:    #0B0F14;
    --fg:    #FFFFFF;   /* wordmark + pivot circle */
    --yellow:#F2C230;   /* screwdriver bar */
    --tick:  #0B0F14;   /* ruler tick cutouts = background color */
    --flash: #FFFFFF;   /* impact radial flash + sonar ring */
    --ui:    rgba(255,255,255,.55);
    --ui-bd: rgba(255,255,255,.14);
  }
  body.light {
    --bg:    #FFFFFF;
    --fg:    #0B0F14;
    --yellow:#D9A400;
    --tick:  #FFFFFF;
    --flash: #0B0F14;
    --ui:    rgba(11,15,20,.55);
    --ui-bd: rgba(11,15,20,.12);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background: var(--bg);
    display: grid;
    place-items: center;
    font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    transition: background-color .6s cubic-bezier(.65,.05,.36,1);
    overflow: hidden;
  }

  /* ---- Stage / logo lockup ---- */
  .stage {
    width: min(88vw, 720px);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .stage svg { width: 100%; height: auto; display: block; overflow: visible; }

  /* Fill/stroke bindings driven by the theme tokens (override SVG attrs). */
  .fg-fill   { fill:   var(--fg); }
  .yellow    { fill:   var(--yellow); }
  .tick      { fill:   var(--tick); }
  .fg-stroke { stroke: var(--fg); }
  #flashGrad .flash-stop { stop-color: var(--flash); }

  /* Bars share a single filter var pair so the idle spin can "breathe"
     their brightness/saturation without touching hue (stays on-brand). */
  #bars { filter: brightness(var(--br,1)) saturate(var(--sa,1)); }

  /* Wordmark letters colored by theme. */
  .char { fill: var(--fg); }

  /* ---- Theme toggle button (unobtrusive, top-right) ---- */
  .toggle {
    position: fixed; top: 20px; right: 20px;
    width: 44px; height: 44px; border-radius: 999px;
    display: grid; place-items: center;
    background: transparent; color: var(--ui);
    border: 1px solid var(--ui-bd); cursor: pointer;
    transition: color .3s, border-color .3s, transform .3s, background-color .3s;
  }
  .toggle:hover { color: var(--fg); transform: rotate(-15deg) scale(1.06); }
  .toggle svg { width: 20px; height: 20px; }
  body.dark  .toggle .sun  { display: block; }
  body.dark  .toggle .moon { display: none; }
  body.light .toggle .sun  { display: none; }
  body.light .toggle .moon { display: block; }

  .hint {
    position: fixed; bottom: 18px; left: 0; right: 0;
    text-align: center; color: var(--ui);
    font-size: 12px; letter-spacing: .06em; text-transform: uppercase;
    pointer-events: none;
  }

  /* ---- Reduced motion: keep only the gentle ambient breath. ---- */
  @media (prefers-reduced-motion: reduce) {
    body { transition: none; }
  }
</style>
</head>
<body class="dark">

  <!-- Theme toggle -->
  <button class="toggle" id="themeToggle" aria-label="Toggle light / dark">
    <svg class="sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.35 15.35A9 9 0 1 1 8.65 3.65 7 7 0 0 0 20.35 15.35z"/></svg>
  </button>

  <!-- ============================================================
       BASE SVG  (pivot at 110,110)
       Bar shapes are drawn horizontally from the pivot; their base
       fan angles (-30 / 0 / +30) are applied by GSAP so rotation
       always happens around the shared pivot (svgOrigin "110 110").
       Structure per bar:
         .bar-fly  -> entrance/exit TRANSLATION (x/y/opacity)
         .bar-rot  -> base angle + hover wiggle ROTATION (around pivot)
       #bars       -> the whole fan (idle 360° spin + brightness breath)
       ============================================================ -->
  <div class="stage" id="stage">
    <svg viewBox="0 0 620 220" role="img" aria-label="Toolkify">
      <defs>
        <!-- soft radial flash for the impact + sonar ping -->
        <radialGradient id="flashGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  class="flash-stop" stop-opacity="0.85"/>
          <stop offset="45%" class="flash-stop" stop-opacity="0.28"/>
          <stop offset="100%" class="flash-stop" stop-opacity="0"/>
        </radialGradient>
        <!-- clip that masks the wordmark so letters "drop" into view -->
        <clipPath id="wmClip"><rect x="182" y="74" width="430" height="72"/></clipPath>
      </defs>

      <g id="lockup">

        <!-- ambient sonar ring + impact flash live behind the fan -->
        <circle id="flash" cx="110" cy="110" r="66" fill="url(#flashGrad)" opacity="0"/>
        <circle id="ping"  cx="110" cy="110" r="15" fill="none" class="fg-stroke" stroke-width="2" opacity="0"/>

        <!-- ICON: three fanned tool bars -->
        <g id="icon">
          <g id="bars">

            <!-- Bar 1 — PINK "wrench" (rounded rect + open ring head) -->
            <g class="bar-fly" data-bar="0">
              <g class="bar-rot" data-base="-30">
                <rect x="110" y="104" width="44" height="12" rx="6" fill="#F5A9C0"/>
                <circle cx="154" cy="110" r="8" fill="none" stroke="#F5A9C0" stroke-width="4"/>
              </g>
            </g>

            <!-- Bar 2 — TEAL "ruler" (rounded rect + 3 tick cutouts) -->
            <g class="bar-fly" data-bar="1">
              <g class="bar-rot" data-base="0">
                <rect x="110" y="104" width="56" height="12" rx="2" fill="#2DD4BF"/>
                <rect class="tick" x="126" y="104" width="2" height="12"/>
                <rect class="tick" x="140" y="104" width="2" height="12"/>
                <rect class="tick" x="154" y="104" width="2" height="12"/>
              </g>
            </g>

            <!-- Bar 3 — YELLOW "screwdriver" (rounded rect + triangular tip) -->
            <g class="bar-fly" data-bar="2">
              <g class="bar-rot" data-base="30">
                <rect class="yellow" x="110" y="104" width="44" height="12" rx="2"/>
                <path class="yellow" d="M154 104 l8 6 l-8 6 z"/>
              </g>
            </g>

          </g>

          <!-- pivot circle where all three bars converge -->
          <circle id="pivot" class="fg-fill" cx="110" cy="110" r="7"/>
        </g>

        <!-- WORDMARK: "Toolkify" — one <text> per char (injected by JS
             for precise metric-based layout + per-letter drop reveal) -->
        <g id="wordmark" clip-path="url(#wmClip)"></g>

      </g>
    </svg>
  </div>

  <p class="hint">Hover to jostle · Click to replay</p>

<script>
/* ================================================================
   TOOLKIFY — animated logo
   Phases: ENTRANCE → IMPACT → IDLE SPIN → AMBIENT → EXIT (loop)
   ================================================================ */

const PIVOT = "110 110";                 // shared rotation origin (svg coords)
const BASE  = [-30, 0, 30];              // fan angles per bar
const stage = document.getElementById("stage");
const flys  = gsap.utils.toArray(".bar-fly");
const rots  = gsap.utils.toArray(".bar-rot");
const bars  = document.getElementById("bars");
const icon  = document.getElementById("icon");
const lockup= document.getElementById("lockup");
const flash = document.getElementById("flash");
const ping  = document.getElementById("ping");
const wm    = document.getElementById("wordmark");

/* ---- Build the wordmark: metric-accurate per-letter layout ---- */
const WORD = "Toolkify";
const SVGNS = "http://www.w3.org/2000/svg";
let chars = [];
function buildWordmark() {
  wm.innerHTML = "";
  chars = [];
  let cursor = 190;                       // x start, tight gap after icon
  for (const ch of WORD) {
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("class", "char");
    t.setAttribute("x", cursor);
    t.setAttribute("y", 110);
    t.setAttribute("font-size", "48");
    t.setAttribute("font-weight", "800");
    t.setAttribute("letter-spacing", "-0.5");
    t.setAttribute("dominant-baseline", "central");
    t.setAttribute("font-family", "'Segoe UI', system-ui, Arial, sans-serif");
    t.textContent = ch;
    wm.appendChild(t);
    const w = t.getComputedTextLength();   // real glyph advance
    cursor += w - 0.5;                     // apply tracking
    chars.push(t);
  }
}
buildWordmark();

/* ================================================================
   INITIAL / RESET STATE
   ================================================================ */
// Each bar enters from a DIFFERENT off-canvas vector, distance & spin —
// no two identical. Converge to (x0,y0,base).
const ENTER = [
  { x:-360, y:-150, rot:-95 },            // pink : from upper-left, over-rotated
  { x:-420, y:  70, rot: 70 },            // teal : from far left, low
  { x:-340, y: 190, rot:-40 },            // yellow: from lower-left
];
const EXIT = [
  { x: 320, y:-170, rot: 60 },            // fly back out on new trajectories
  { x: 440, y:  40, rot:-80 },
  { x: 300, y: 210, rot: 55 },
];

function resetState() {
  gsap.set(bars,   { rotation:0, svgOrigin:PIVOT, "--br":1, "--sa":1 });
  gsap.set(lockup, { scale:1, svgOrigin:"250 115" });
  gsap.set(icon,   { scale:1, x:0, svgOrigin:PIVOT });
  flys.forEach((f,i)=> gsap.set(f, { x:ENTER[i].x, y:ENTER[i].y, opacity:0 }));
  rots.forEach((r,i)=> gsap.set(r, { rotation:BASE[i]+ENTER[i].rot, svgOrigin:PIVOT }));
  gsap.set(chars,  { yPercent:-38, opacity:0 });
  gsap.set([flash,ping], { opacity:0 });
}

/* Per-part signature eases (custom curves / springs — no browser defaults). */
const EASE = {
  pinkFly:  "back.out(2.4)",
  tealFly:  "elastic.out(1, 0.62)",
  yellowFly:"back.out(1.7)",
  settle:   "elastic.out(1, 0.55)",
  spin:     "power3.inOut",              // fast in the middle, slow at ends
  drop:     "back.out(1.8)",
  exit:     "power3.in",
};
const FLY_EASE = [EASE.pinkFly, EASE.tealFly, EASE.yellowFly];

/* ================================================================
   MASTER TIMELINE
   ================================================================ */
let master;
function buildTimeline() {
  const tl = gsap.timeline({ repeat:-1, repeatDelay:0.18, onRepeat:resetState });

  // ---------- // ENTRANCE (0.0s–1.2s) ----------
  // Bars fly in independently, cascading 80–150ms apart, overshoot & snap.
  flys.forEach((f,i)=>{
    tl.to(f, { x:0, y:0, opacity:1, duration:1.0, ease:FLY_EASE[i] }, i*0.12);
    tl.to(rots[i], { rotation:BASE[i], duration:1.1, ease:EASE.settle, svgOrigin:PIVOT }, i*0.12);
  });

  // ---------- // WORDMARK REVEAL (overlaps entrance, starts ~0.6s) ----------
  // Letters drop into a masked line, 40ms stagger, last lands as impact fires.
  tl.to(chars, {
    yPercent:0, opacity:1, duration:0.5, ease:EASE.drop,
    stagger:0.04,
  }, 0.6);

  // ---------- // IMPACT (1.2s–1.5s) ----------
  tl.add("impact", 1.2);
  // scale pulse on the icon
  tl.to(icon, { scale:1.08, duration:0.12, ease:"power2.out", svgOrigin:PIVOT }, "impact")
    .to(icon, { scale:1.0,  duration:0.5,  ease:"elastic.out(1,0.4)", svgOrigin:PIVOT }, "impact+=0.12");
  // radial flash from the pivot
  tl.fromTo(flash, { opacity:0, scale:0.4, svgOrigin:PIVOT },
                   { opacity:1, scale:1.15, duration:0.14, ease:"power2.out", svgOrigin:PIVOT }, "impact")
    .to(flash, { opacity:0, scale:1.6, duration:0.5, ease:"power2.out", svgOrigin:PIVOT }, "impact+=0.14");
  // damped single-axis "weight" shake
  tl.to(lockup, { x:"+=3", duration:0.05, ease:"power1.inOut" }, "impact")
    .to(lockup, { x:"-=3", duration:0.28, ease:"elastic.out(1,0.3)" }, "impact+=0.05");

  // ---------- // IDLE SPIN FLOURISH (1.5s–3.0s) ----------
  // Whole fan does one 360° revolution around the pivot; fast middle / slow ends.
  tl.to(bars, { rotation:360, duration:1.45, ease:EASE.spin, svgOrigin:PIVOT }, 1.55);
  // colors "breathe" (brightness+saturation) during the spin — hue untouched.
  tl.to(bars, { "--br":1.22, "--sa":1.18, duration:0.72, ease:"sine.inOut" }, 1.55)
    .to(bars, { "--br":1,    "--sa":1,    duration:0.73, ease:"sine.inOut" }, 2.27);

  // ---------- // AMBIENT LOOP / IDLE HOLD (3.0s–5.0s) ----------
  // Barely-perceptible breathing + two sonar pings — the "alive at rest" state.
  tl.to(lockup, { scale:1.015, duration:1.0, ease:"sine.inOut", svgOrigin:"250 115" }, 3.0)
    .to(lockup, { scale:1.0,   duration:1.0, ease:"sine.inOut", svgOrigin:"250 115" }, 4.0);
  // ping #1 & #2 (sonar ripple out from the pivot)
  [3.1, 4.1].forEach(t=>{
    tl.fromTo(ping, { opacity:0.55, scale:0.35, svgOrigin:PIVOT },
                    { opacity:0, scale:4.2, duration:1.4, ease:"power2.out", svgOrigin:PIVOT }, t);
  });

  // ---------- // EXIT / RESET (5.0s–5.7s) ----------
  // Bars retract on fresh trajectories, snappy ease-in, then a held-breath beat.
  flys.forEach((f,i)=>{
    tl.to(f, { x:EXIT[i].x, y:EXIT[i].y, opacity:0, duration:0.5, ease:EASE.exit }, 5.0 + i*0.05);
    tl.to(rots[i], { rotation:BASE[i]+EXIT[i].rot, duration:0.5, ease:EASE.exit, svgOrigin:PIVOT }, 5.0 + i*0.05);
  });
  tl.to(chars, { yPercent:-38, opacity:0, duration:0.35, ease:"power2.in", stagger:0.02 }, 5.0);

  return tl;
}

/* ================================================================
   INTERACTIONS
   ================================================================ */
let reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// // HOVER — independent per-bar wiggle (±3–5°) with springy return,
// layered on top of whatever the master loop is doing.
function wiggle() {
  if (reduced) return;
  rots.forEach((r,i)=>{
    const dir = i % 2 ? -1 : 1;
    const d = dir * gsap.utils.random(3, 5);
    gsap.to(r, {
      rotation: "+=" + d, duration:0.14, ease:"power2.out",
      svgOrigin:PIVOT, overwrite:"auto",
      onComplete(){
        gsap.to(r, { rotation:"-=" + d, duration:0.9, ease:"elastic.out(1,0.35)", svgOrigin:PIVOT });
      }
    });
  });
}
stage.addEventListener("mouseenter", wiggle);

// // CLICK — one-off celebration replay of the full entrance (graceful restart).
stage.addEventListener("click", ()=>{
  if (reduced || !master) return;
  resetState();
  master.restart(true);
});

/* ================================================================
   BOOT  (respect prefers-reduced-motion)
   ================================================================ */

// Render a correct STATIC logo (used as the no-JS / no-GSAP / reduced fallback).
function showStatic() {
  flys.forEach(f=> gsap.set(f, { x:0, y:0, opacity:1 }));
  rots.forEach((r,i)=> gsap.set(r, { rotation:BASE[i], svgOrigin:PIVOT }));
  gsap.set(chars, { yPercent:0, opacity:1 });
  gsap.set([flash,ping], { opacity:0 });
}

function boot() {
  // Hard guard: if the GSAP CDN failed to load, don't leave a blank canvas —
  // the SVG already has the base angles baked in, so just make sure nothing
  // is hidden and bail out gracefully.
  if (typeof gsap === "undefined") return;

  gsap.ticker.lagSmoothing(0);   // keep motion advancing (also fixes headless)

  buildWordmark();               // re-measure now that fonts are ready
  resetState();

  if (reduced) {
    // Minimal-motion fallback: resting lockup + a gentle breath only.
    showStatic();
    gsap.to(lockup, { scale:1.015, duration:2.2, ease:"sine.inOut",
                      repeat:-1, yoyo:true, svgOrigin:"250 115" });
    return;
  }
  master = buildTimeline();
}

// Boot as soon as the DOM is ready — do NOT block on document.fonts.ready
// (which can hang in some environments). Re-measure the wordmark once fonts
// finish loading so tracking stays metric-accurate.
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(()=>{ if (master) { buildWordmark(); } });
}

/* ---- Theme toggle ---- */
document.getElementById("themeToggle").addEventListener("click", ()=>{
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
});

// keep reduced-motion decision live if the user changes OS setting
window.matchMedia("(prefers-reduced-motion: reduce)").addEventListener?.("change", e=>{
  reduced = e.matches;
});
</script>
</body>
</html>
