<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Toolkify logo with fanned tool icon and clean matching wordmark on light and dark backgrounds</title>
<desc>An icon of three rounded bars fanning from a point, styled as a wrench, a screwdriver, and a ruler with tick marks, in pink, teal, and yellow, next to the wordmark Toolkify set in a clean bold sans serif, shown on dark navy and white backgrounds.</desc>

<!-- Dark background version -->
<rect x="20" y="20" width="640" height="120" rx="12" fill="#0B0F14"/>
<g transform="translate(72,95) rotate(-30)">
<rect x="0" y="-6" width="44" height="12" rx="6" fill="#F5A9C0"/>
<circle cx="44" cy="0" r="8" fill="none" stroke="#F5A9C0" stroke-width="4"/>
</g>
<g transform="translate(72,95) rotate(0)">
<rect x="0" y="-6" width="56" height="12" rx="2" fill="#2DD4BF"/>
<rect x="16" y="-6" width="2" height="12" fill="#0B0F14"/>
<rect x="30" y="-6" width="2" height="12" fill="#0B0F14"/>
<rect x="44" y="-6" width="2" height="12" fill="#0B0F14"/>
</g>
<g transform="translate(72,95) rotate(30)">
<rect x="0" y="-6" width="44" height="12" rx="2" fill="#F2C230"/>
<path d="M44 -6 l8 6 l-8 6 z" fill="#F2C230"/>
</g>
<circle cx="72" cy="95" r="7" fill="#FFFFFF"/>
<text x="148" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.5" fill="#FFFFFF" dominant-baseline="central" text-anchor="start">Toolkify</text>

<!-- Light background version -->
<rect x="20" y="160" width="640" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<g transform="translate(72,235) rotate(-30)">
<rect x="0" y="-6" width="44" height="12" rx="6" fill="#F5A9C0"/>
<circle cx="44" cy="0" r="8" fill="none" stroke="#F5A9C0" stroke-width="4"/>
</g>
<g transform="translate(72,235) rotate(0)">
<rect x="0" y="-6" width="56" height="12" rx="2" fill="#2DD4BF"/>
<rect x="16" y="-6" width="2" height="12" fill="#FFFFFF"/>
<rect x="30" y="-6" width="2" height="12" fill="#FFFFFF"/>
<rect x="44" y="-6" width="2" height="12" fill="#FFFFFF"/>
</g>
<g transform="translate(72,235) rotate(30)">
<rect x="0" y="-6" width="44" height="12" rx="2" fill="#D9A400"/>
<path d="M44 -6 l8 6 l-8 6 z" fill="#D9A400"/>
</g>
<circle cx="72" cy="235" r="7" fill="#0B0F14"/>
<text x="148" y="235" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.5" fill="#0B0F14" dominant-baseline="central" text-anchor="start">Toolkify</text>
</svg>
